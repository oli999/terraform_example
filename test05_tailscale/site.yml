# site.yml
# tailscale 관련 설정을 설치하고 구현해서 infra 가 생성된 직후에 mgmt node 와 vpn 연결이 되게 한다.
# 지금은 ansible 로 하지만 다음예제는  terraform 으로 tailscale 에 직접 access 해서 할 예정 
---
- name: "Step1. EC2 Tailcale 설치 및 광고 설정"
  hosts: all
  become: yes
  vars:
    # 환경 변수에 등록된 값을 lookup() 함수를 이용해서 읽어와서 넣어준다.
    tailscale_auth_key: "{{ lookup('env', 'TAILSCALE_AUTH_KEY')}}"
    aws_vpc_cidr: "10.0.0.0/16"
  tasks:
    - name: "1. Tailscale 설치"
      ansible.builtin.shell:
        cmd: "curl -fsSL https://tailscale.com/install.sh | sh"
        creates: /usr/bin/tailscale
      args:
        executable: /bin/bash

    - name: "2. Tailscale 서비스 시작"
      ansible.builtin.systemd:
        name: tailscaled
        state: started
        enabled: yes

    - name: "3. IP 포워딩 활성화"
      ansible.posix.sysctl:
        name: "{{ item }}"
        value: '1'
        state: present
        reload: yes
      loop:
        - net.ipv4.ip_forward
        - net.ipv6.conf.all.forwarding

    - name: "4. Tailscale 로그인 및 경로 광고 시작"
      ansible.builtin.command:
        # > 기호는 여러줄의 문장을 실행시 한줄로 합쳐서 실행합니다
        cmd: >
          tailscale up 
          --authkey={{ tailscale_auth_key }} 
          --advertise-routes={{ aws_vpc_cidr }} 
          --accept-routes
      # 실행결과를 tailscale_up_result 에 라는 변수에 저장(디버깅용)
      register: tailscale_up_result
      # 리눅스 리턴코드(rc) 가 0 이면 (changed) 로 표시되도록 (멱등성관리)
      changed_when: tailscale_up_result.rc == 0    

- name: "Step2. 확정된 hostname 기반 기기 승인"
  hosts: all
  vars:
    tailscale_api_key: "{{ lookup('env', 'TAILSCALE_API_KEY')}}"
    # tailscale 에 로그인한 본인의 계정명이 tailnet 의 이름으로 등록되어 있다.
    tailnet_name: "myoli999@gmail.com"
    aws_vpc_cidr: "10.0.0.0/16"
  tasks:
    - name: "STEP 1: 경로 전파 및 API 등록 대기"
      ansible.builtin.pause:
        seconds: 20
      delegate_to: localhost

    - name: "STEP 2: Tailscale 기기 목록 조회"
      ansible.builtin.uri:
        url: "https://api.tailscale.com/api/v2/tailnet/{{ tailnet_name }}/devices"
        method: GET
        user: "{{ tailscale_api_key }}"
        password: ""
        force_basic_auth: yes
      register: tailscale_devices
      delegate_to: localhost

    - name: "STEP 3: 전달받은 Hostname으로 즉시 ID 추출"
      ansible.builtin.set_fact:
        # 테라폼에서 넘겨준 target_hostname과 일치하는 녀석의 ID만 쏙!
        target_device_id: "{{ tailscale_devices.json.devices | json_query(query) }}"
      vars:
        # host_name 은 playbook 을 실행할때 option 으로 전달하도록 할 예정 
        query: "[?hostname=='{{host_name}}'].id | [0]"
      delegate_to: localhost  
      
    - name: "STEP 4: VPC 라우트 승인 API 전송"
      ansible.builtin.uri:
        url: "https://api.tailscale.com/api/v2/device/{{ target_device_id }}/routes"
        method: POST
        user: "{{ tailscale_api_key }}"
        password: ""
        force_basic_auth: yes
        body_format: json
        body:
          routes: ["{{ aws_vpc_cidr }}"]
        status_code: 200
      when: target_device_id
      delegate_to: localhost

    - name: "STEP 5: 최종 결과 디버깅"
      ansible.builtin.debug:
        msg: "타겟 호스트: {{host_name}}, 기기 ID: {{ target_device_id }} 승인 완료"      